services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ENV=${ENV}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - JWT_SECRET=${JWT_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  web:
    build: ./frontend
    ports:
      - "8087:443"
    volumes:
      - ./nginx-certs:/etc/nginx/certs:ro
    depends_on:
      - api
    restart: unless-stopped
