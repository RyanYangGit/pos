services:
  api:
    build: ./backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ENV=${ENV}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - JWT_SECRET=${JWT_SECRET}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - default
      - reverse-proxy
    restart: unless-stopped

  web:
    build: ./frontend
    ports:
      - "127.0.0.1:8087:80"
    depends_on:
      - api
    networks:
      - default
      - reverse-proxy
    restart: unless-stopped

networks:
  reverse-proxy:
    external: true
    name: reverse-proxy_default
