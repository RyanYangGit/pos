services:
  api:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://pos:pos@host.docker.internal:5432/pos_dev
      - ENV=development
      - CORS_ORIGINS=http://localhost:5173
    volumes:
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
